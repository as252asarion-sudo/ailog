name: Build Android AAB

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "ビルド後にクローズドテストへ公開する"
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build Android AAB
        run: eas build --platform android --profile production --local --non-interactive --output ./app.aab
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ailog-release
          path: ./app.aab
          retention-days: 30

      - name: Publish to closed test track
        if: ${{ inputs.publish }}
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_BASE64" | base64 -d > google-service-account.json
          pip install --quiet google-auth requests
          python scripts/publish_play.py --aab ./app.aab --track "AIログクローズドテスト"
          rm -f google-service-account.json
        env:
          GOOGLE_SERVICE_ACCOUNT_BASE64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_BASE64 }}
